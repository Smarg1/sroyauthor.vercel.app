name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        node-version: [24.12.0]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version safely
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git fetch --tags
          git config user.name "ci-bot"
          git config user.email "ci@users.noreply.github.com"

          # bump patch version safely, rollback on failure
          set -e
          npm version patch -m "chore(release): %s"
          git push --follow-tags || (echo "Version bump failed, reverting..." && git reset --hard HEAD^ && exit 1)

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          check-latest: true
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Format check
        run: npx prettier --check .

      - name: Build Next.js
        run: npm run build
